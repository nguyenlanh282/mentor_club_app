name: Đăng bài Facebook (Reel/Ảnh) từ Lark Base

# Chạy THEO YÊU CẦU: vào tab Actions → chọn workflow này → "Run workflow",
# hoặc gọi qua API dispatch từ nút bấm trong Lark Base.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Chỉ liệt kê, KHÔNG đăng (kiểm tra trước)'
        type: boolean
        default: false
      post_all:
        description: 'Đăng MỌI dòng đủ Page+file (bỏ qua cổng tick "Đăng")'
        type: boolean
        default: false
      record_id:
        description: 'Chỉ đăng đúng 1 dòng (record_id) — nút bấm trong Lark truyền vào đây'
        type: string
        default: ''

concurrency:
  group: dang-bai-facebook
  cancel-in-progress: false

jobs:
  dang-bai:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Đăng bài lên Facebook
        working-directory: dang-facebook/scripts
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_APP_TOKEN: ${{ secrets.LARK_APP_TOKEN }}
          LARK_TABLE_ID: ${{ secrets.LARK_TABLE_ID }}
          PAGES_TABLE_ID: ${{ secrets.PAGES_TABLE_ID }}
          TRIGGER_GATE: ${{ inputs.post_all && 'false' || 'true' }}
          RECORD_ID: ${{ inputs.record_id }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          echo "Chạy: node post-multi-reel-api.js $ARGS  (TRIGGER_GATE=$TRIGGER_GATE)"
          node post-multi-reel-api.js $ARGS
